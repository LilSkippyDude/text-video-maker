<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easy Text Video Maker</title>
<style>
body {
  margin: 0;
  background: #1a1a1a;
  font-family: Tahoma, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  color: #ddd;
}
h1 {
  font-size: 18px;
  font-weight: normal;
  margin-bottom: 20px;
}
#preview {
  width: 640px;
  height: 360px;
  background: #0c437b;
  border: 1px solid #333;
}
#frames {
  width: 640px;
  margin-top: 20px;
}
.frame {
  background: #242424;
  border: 1px solid #3a3a3a;
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.frame textarea {
  flex: 1;
  height: 60px;
  background: #111;
  color: #fff;
  border: 1px solid #444;
  font-family: Arial, sans-serif;
  font-size: 14px;
  padding: 6px;
  resize: vertical;
}
.frame .side {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 120px;
}
.frame label {
  font-size: 11px;
  color: #999;
}
.frame input[type="number"] {
  width: 60px;
}
button {
  background: #333;
  color: #ddd;
  border: 1px solid #555;
  padding: 8px 16px;
  cursor: pointer;
  margin-top: 4px;
}
button:hover {
  background: #444;
}
button.small {
  padding: 4px 8px;
  font-size: 12px;
}
#toolbar {
  width: 640px;
  margin-top: 16px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
#status {
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}
</style>
</head>
<body>
<canvas id="preview" width="640" height="360"></canvas>

<div id="toolbar">
<button onclick="playPreview()">play preview</button>
<label style="font-size:13px">audio <input type="file" id="audioFile" accept="audio/*"></label>
<button onclick="exportVideo()">export 720p video</button>
</div>
<div id="status"></div>

<div id="frames"></div>
<button onclick="addFrame()">add frame</button>

<script>
var frames = [
  { text: "your text here", duration: 5, size: 40 }
];

var frameList = document.getElementById('frames');
var canvas = document.getElementById('preview');
var ctx = canvas.getContext('2d');
var transitionTime = 1.25;

function renderFrameList() {
  frameList.innerHTML = '';
  for (var i = 0; i < frames.length; i++) {
    var frame = frames[i];
    var row = document.createElement('div');
    row.className = 'frame';

    var textarea = document.createElement('textarea');
    textarea.value = frame.text;
    textarea.oninput = (function(index) {
      return function(event) { frames[index].text = event.target.value; };
    })(i);

    var side = document.createElement('div');
    side.className = 'side';

    var durationLabel = document.createElement('label');
    durationLabel.textContent = 'duration (seconds)';
    var durationInput = document.createElement('input');
    durationInput.type = 'number';
    durationInput.min = '0.5';
    durationInput.step = '0.1';
    durationInput.value = frame.duration;
    durationInput.oninput = (function(index) {
      return function(event) { frames[index].duration = parseFloat(event.target.value) || 1; };
    })(i);

    var sizeLabel = document.createElement('label');
    sizeLabel.textContent = 'font size';
    var sizeInput = document.createElement('input');
    sizeInput.type = 'number';
    sizeInput.min = '12';
    sizeInput.max = '100';
    sizeInput.value = frame.size;
    sizeInput.oninput = (function(index) {
      return function(event) { frames[index].size = parseInt(event.target.value) || 40; };
    })(i);

    var removeButton = document.createElement('button');
    removeButton.className = 'small';
    removeButton.textContent = 'remove';
    removeButton.onclick = (function(index) {
      return function() { frames.splice(index, 1); renderFrameList(); };
    })(i);

    side.appendChild(durationLabel);
    side.appendChild(durationInput);
    side.appendChild(sizeLabel);
    side.appendChild(sizeInput);
    side.appendChild(removeButton);

    row.appendChild(textarea);
    row.appendChild(side);
    frameList.appendChild(row);
  }
}

function addFrame() {
  frames.push({ text: "new text", duration: 5, size: 40 });
  renderFrameList();
}

function drawFrame(targetCtx, width, height, text, size, alpha) {
  targetCtx.globalAlpha = alpha;
  targetCtx.fillStyle = '#0c437b';
  targetCtx.fillRect(0, 0, width, height);
  targetCtx.fillStyle = '#ffffff';
  var scale = width / 640;
  targetCtx.font = (size * scale) + 'px Arial';
  targetCtx.textAlign = 'center';
  targetCtx.textBaseline = 'middle';
  var lines = text.split('\n');
  var lineHeight = size * scale * 1.3;
  var startY = height / 2 - ((lines.length - 1) * lineHeight) / 2;
  for (var i = 0; i < lines.length; i++) {
    targetCtx.fillText(lines[i], width / 2, startY + i * lineHeight);
  }
  targetCtx.globalAlpha = 1;
}

function drawAtTime(targetCtx, width, height, time) {
  var elapsed = 0;
  for (var i = 0; i < frames.length; i++) {
    var frame = frames[i];
    var frameStart = elapsed;
    var frameEnd = elapsed + frame.duration;
    if (time >= frameStart && time < frameEnd) {
      var fadeIn = i === 0 ? 0 : Math.min(1, (time - frameStart) / transitionTime);
      drawFrame(targetCtx, width, height, frame.text, frame.size, 1);
      if (i > 0 && (time - frameStart) < transitionTime) {
        drawFrame(targetCtx, width, height, frames[i - 1].text, frames[i - 1].size, 1 - fadeIn);
        drawFrame(targetCtx, width, height, frame.text, frame.size, fadeIn);
      }
      return;
    }
    elapsed = frameEnd;
  }
  var last = frames[frames.length - 1];
  drawFrame(targetCtx, width, height, last.text, last.size, 1);
}

function totalDuration() {
  var total = 0;
  for (var i = 0; i < frames.length; i++) total += frames[i].duration;
  return total;
}

var previewPlaying = false;

function playPreview() {
  if (previewPlaying) return;
  previewPlaying = true;
  var startTime = performance.now();
  var duration = totalDuration();
  function step(now) {
    var elapsed = (now - startTime) / 1000;
    if (elapsed >= duration) {
      drawAtTime(ctx, canvas.width, canvas.height, duration - 0.001);
      previewPlaying = false;
      return;
    }
    drawAtTime(ctx, canvas.width, canvas.height, elapsed);
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function exportVideo() {
  var status = document.getElementById('status');
  var exportCanvas = document.createElement('canvas');
  exportCanvas.width = 1280;
  exportCanvas.height = 720;
  var exportCtx = exportCanvas.getContext('2d');

  var stream = exportCanvas.captureStream(30);
  var audioFileInput = document.getElementById('audioFile');

  function startRecording(finalStream) {
    var recorder = new MediaRecorder(finalStream, { mimeType: 'video/webm;codecs=vp9,opus' });
    var chunks = [];
    recorder.ondataavailable = function(event) {
      if (event.data.size > 0) chunks.push(event.data);
    };
    recorder.onstop = function() {
      var blob = new Blob(chunks, { type: 'video/webm' });
      var link = document.createElement('a');
      link.download = 'blue_screen_video.webm';
      link.href = URL.createObjectURL(blob);
      link.click();
      status.textContent = 'done, video downloaded';
    };

    var duration = totalDuration();
    var startTime = performance.now();
    recorder.start();
    status.textContent = 'recording...';

    function step(now) {
      var elapsed = (now - startTime) / 1000;
      if (elapsed >= duration) {
        recorder.stop();
        return;
      }
      drawAtTime(exportCtx, exportCanvas.width, exportCanvas.height, elapsed);
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  if (audioFileInput.files.length > 0) {
    var audioElement = new Audio(URL.createObjectURL(audioFileInput.files[0]));
    var audioContext = new AudioContext();
    var audioSource = audioContext.createMediaElementSource(audioElement);
    var destination = audioContext.createMediaStreamDestination();
    audioSource.connect(destination);
    audioElement.play();
    var finalStream = new MediaStream();
    stream.getVideoTracks().forEach(function(track) { finalStream.addTrack(track); });
    destination.stream.getAudioTracks().forEach(function(track) { finalStream.addTrack(track); });
    startRecording(finalStream);
  } else {
    startRecording(stream);
  }
}

renderFrameList();
</script>
</body>
</html>
