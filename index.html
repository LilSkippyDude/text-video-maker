<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Easy Text Video Maker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpolygon points='20,20 80,50 20,80' fill='%230c437b'/%3E%3C/svg%3E" type="image/svg+xml">
<style>
body {
  margin: 0;
  background: #1a1a1a;
  font-family: Tahoma, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  color: #ddd;
}
h1 {
  font-size: 18px;
  font-weight: normal;
  margin-bottom: 20px;
}
#preview {
  width: 640px;
  height: 360px;
  background: #0c437b;
  border: 1px solid #333;
}
#frames {
  width: 640px;
  margin-top: 20px;
}
.frame {
  background: #242424;
  border: 1px solid #3a3a3a;
  padding: 10px 12px 12px 12px;
  margin-bottom: 10px;
  display: flex;
  flex-direction: column;
  transition: border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
}
.frame.dragover {
  border-color: #0c437b;
  background: #1c2f42;
  transform: scale(1.01);
}
.frame.dragging {
  opacity: 0.35;
}
.framehead {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 4px;
}
.framecontent {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.draghandle {
  display: grid;
  grid-template-columns: repeat(2, 6px);
  grid-template-rows: repeat(3, 6px);
  gap: 3px;
  padding: 8px 10px;
  border-radius: 4px;
  cursor: grab;
  transition: background 0.15s ease, transform 0.1s ease;
}
.draghandle:hover {
  background: #3a3a3a;
  transform: scale(1.15);
}
.draghandle:active {
  cursor: grabbing;
  background: #0c437b;
}
.draghandle span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #777;
  transition: background 0.15s ease;
}
.draghandle:hover span {
  background: #eee;
}
.frame textarea {
  flex: 1;
  height: 60px;
  background: #111;
  color: #fff;
  border: 1px solid #444;
  font-family: Arial, sans-serif;
  font-size: 14px;
  padding: 6px;
  resize: vertical;
}
.frame .side {
  display: flex;
  flex-direction: column;
  gap: 6px;
  width: 150px;
}
.frame label {
  font-size: 11px;
  color: #999;
}
.frame input[type="number"] {
  width: 60px;
}
button {
  background: #333;
  color: #ddd;
  border: 1px solid #555;
  padding: 8px 16px;
  cursor: pointer;
  margin-top: 4px;
}
button:hover {
  background: #444;
}
button.small {
  padding: 4px 8px;
  font-size: 12px;
}
button.active {
  background: #0c437b;
  border-color: #0c437b;
  color: #fff;
}
.imagebox {
  width: 100%;
  height: 70px;
  border: 1px dashed #555;
  background-size: cover;
  background-position: center;
  outline: none;
  color: #666;
  font-size: 11px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.imagebox:empty:before {
  content: "click, then paste image (ctrl+v)";
}
.uploadbtn {
  background: #333;
  color: #ddd;
  border: 1px solid #555;
  padding: 4px 8px;
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  display: block;
}
.uploadbtn:hover {
  background: #444;
}
select {
  background: #333;
  color: #ddd;
  border: 1px solid #555;
  padding: 6px;
}
#toolbar {
  width: 640px;
  margin-top: 16px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
#status {
  margin-top: 10px;
  font-size: 13px;
  color: #aaa;
}
</style>
</head>
<body>
<canvas id="preview" width="640" height="360"></canvas>
<div id="toolbar">
<button onclick="playPreview()">play preview</button>
<button id="aspect169" class="active" onclick="setAspect('16:9')">16:9</button>
<button id="aspect43" onclick="setAspect('4:3')">4:3</button>
<label style="font-size:13px">audio <input type="file" id="audioFile" accept="audio/*" onchange="handleAudioUpload(event)"></label>
<label style="font-size:13px">quality
<select id="qualitySelect">
<option value="480p">480p</option>
<option value="720p" selected>720p</option>
<option value="1080p">1080p</option>
</select>
</label>
<button onclick="exportVideo()">export video</button>
</div>
<div id="status"></div>
<div id="frames"></div>
<button onclick="addFrame()">add frame</button>
<script>
var frames = [
  { text: "your text here", duration: 5, size: 40, fade: 1.25, image: null, imageObj: null }
];
var frameList = document.getElementById('frames');
var canvas = document.getElementById('preview');
var ctx = canvas.getContext('2d');
var aspectRatio = '16:9';
var dragSourceIndex = null;
var activeAudioBlob = null;
function handleAudioUpload(event) {
  var file = event.target.files[0];
  if (!file) {
    activeAudioBlob = null;
    return;
  }
  activeAudioBlob = file;
  if (confirm('compress this audio to sound more oldschool?')) {
    compressAudioLikeOldYoutube(file);
  }
}
function compressAudioLikeOldYoutube(file) {
  var status = document.getElementById('status');
  status.textContent = 'compressing audio...';
  var reader = new FileReader();
  reader.onload = function(event) {
    var decodeContext = new AudioContext();
    decodeContext.decodeAudioData(event.target.result, function(buffer) {
      decodeContext.close();
      var targetRate = 32000;
      var offlineContext = new OfflineAudioContext(1, Math.ceil(buffer.duration * targetRate), targetRate);
      var source = offlineContext.createBufferSource();
      source.buffer = buffer;
      var highpass = offlineContext.createBiquadFilter();
      highpass.type = "highpass";
      highpass.frequency.value = 90;
      var lowpass = offlineContext.createBiquadFilter();
      lowpass.type = "lowpass";
      lowpass.frequency.value = 6800;
      lowpass.Q.value = 0.5;
      var compressor = offlineContext.createDynamicsCompressor();
      compressor.threshold.value = -24;
      compressor.knee.value = 20;
      compressor.ratio.value = 4;
      compressor.attack.value = 0.01;
      compressor.release.value = 0.2;
      source.connect(highpass);
      highpass.connect(lowpass);
      lowpass.connect(compressor);
      compressor.connect(offlineContext.destination);
      source.start();
      offlineContext.startRendering().then(function(renderedBuffer) {
        activeAudioBlob = bufferToWavBlob(renderedBuffer);
        status.textContent = 'audio compressed';
      });
    }, function() {
      status.textContent = 'could not compress audio';
    });
  };
  reader.readAsArrayBuffer(file);
}
function bufferToWavBlob(buffer) {
  var numChannels = buffer.numberOfChannels;
  var sampleRate = buffer.sampleRate;
  var length = buffer.length * numChannels * 2 + 44;
  var arrayBuffer = new ArrayBuffer(length);
  var view = new DataView(arrayBuffer);
  function writeString(offset, string) {
    for (var s = 0; s < string.length; s++) view.setUint8(offset + s, string.charCodeAt(s));
  }
  writeString(0, 'RIFF');
  view.setUint32(4, length - 8, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * 2, true);
  view.setUint16(32, numChannels * 2, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, length - 44, true);
  var offset = 44;
  for (var i = 0; i < buffer.length; i++) {
    for (var channel = 0; channel < numChannels; channel++) {
      var sample = Math.max(-1, Math.min(1, buffer.getChannelData(channel)[i]));
      view.setInt16(offset, sample < 0 ? sample * 32768 : sample * 32767, true);
      offset += 2;
    }
  }
  return new Blob([arrayBuffer], { type: 'audio/wav' });
}
function renderFrameList() {
  frameList.innerHTML = '';
  for (var i = 0; i < frames.length; i++) {
    var frame = frames[i];
    var row = document.createElement('div');
    row.className = 'frame';
    row.ondragover = function(event) {
      event.preventDefault();
      row.classList.add('dragover');
    };
    row.ondragleave = function() {
      row.classList.remove('dragover');
    };
    row.ondrop = (function(index) {
      return function(event) {
        event.preventDefault();
        row.classList.remove('dragover');
        if (dragSourceIndex === null || dragSourceIndex === index) return;
        var moved = frames.splice(dragSourceIndex, 1)[0];
        frames.splice(index, 0, moved);
        dragSourceIndex = null;
        renderFrameList();
      };
    })(i);
    var framehead = document.createElement('div');
    framehead.className = 'framehead';
    var handle = document.createElement('div');
    handle.className = 'draghandle';
    handle.draggable = true;
    for (var d = 0; d < 6; d++) handle.appendChild(document.createElement('span'));
    handle.ondragstart = (function(index) {
      return function(event) {
        dragSourceIndex = index;
        event.dataTransfer.effectAllowed = 'move';
        setTimeout(function() { row.classList.add('dragging'); }, 0);
      };
    })(i);
    handle.ondragend = function() {
      row.classList.remove('dragging');
    };
    framehead.appendChild(handle);
    var framecontent = document.createElement('div');
    framecontent.className = 'framecontent';
    var textarea = document.createElement('textarea');
    textarea.value = frame.text;
    textarea.oninput = (function(index) {
      return function(event) {
        frames[index].text = event.target.value;
        showFrameLive(index);
      };
    })(i);
    var side = document.createElement('div');
    side.className = 'side';
    var durationLabel = document.createElement('label');
    durationLabel.textContent = 'duration (seconds)';
    var durationInput = document.createElement('input');
    durationInput.type = 'number';
    durationInput.min = '0.5';
    durationInput.step = '0.1';
    durationInput.value = frame.duration;
    durationInput.oninput = (function(index) {
      return function(event) {
        frames[index].duration = parseFloat(event.target.value) || 1;
        showFrameLive(index);
      };
    })(i);
    var sizeLabel = document.createElement('label');
    sizeLabel.textContent = 'font size';
    var sizeInput = document.createElement('input');
    sizeInput.type = 'number';
    sizeInput.min = '12';
    sizeInput.max = '100';
    sizeInput.value = frame.size;
    sizeInput.oninput = (function(index) {
      return function(event) {
        frames[index].size = parseInt(event.target.value) || 40;
        showFrameLive(index);
      };
    })(i);
    var fadeLabel = document.createElement('label');
    fadeLabel.textContent = 'fade out (seconds)';
    var fadeInput = document.createElement('input');
    fadeInput.type = 'number';
    fadeInput.min = '0';
    fadeInput.step = '0.1';
    fadeInput.value = frame.fade;
    fadeInput.oninput = (function(index) {
      return function(event) {
        frames[index].fade = parseFloat(event.target.value) || 0;
        showFrameLive(index);
      };
    })(i);
    var imageLabel = document.createElement('label');
    imageLabel.textContent = 'image';
    var imageBox = document.createElement('div');
    imageBox.className = 'imagebox';
    imageBox.contentEditable = 'true';
    imageBox.spellcheck = false;
    if (frame.image) imageBox.style.backgroundImage = 'url(' + frame.image + ')';
    imageBox.onkeydown = function(event) { event.preventDefault(); };
    imageBox.onpaste = (function(index) {
      return function(event) {
        event.preventDefault();
        var items = event.clipboardData.items;
        for (var j = 0; j < items.length; j++) {
          if (items[j].type.indexOf('image') !== -1) {
            loadImageFile(items[j].getAsFile(), index);
            break;
          }
        }
      };
    })(i);
    var uploadLabel = document.createElement('label');
    uploadLabel.className = 'uploadbtn';
    uploadLabel.textContent = 'upload image';
    var uploadInput = document.createElement('input');
    uploadInput.type = 'file';
    uploadInput.accept = 'image/*';
    uploadInput.style.display = 'none';
    uploadInput.onchange = (function(index) {
      return function(event) {
        if (event.target.files[0]) loadImageFile(event.target.files[0], index);
      };
    })(i);
    uploadLabel.appendChild(uploadInput);
    var removeButton = document.createElement('button');
    removeButton.className = 'small';
    removeButton.textContent = 'remove frame';
    removeButton.onclick = (function(index) {
      return function() { frames.splice(index, 1); renderFrameList(); };
    })(i);
    side.appendChild(durationLabel);
    side.appendChild(durationInput);
    side.appendChild(sizeLabel);
    side.appendChild(sizeInput);
    side.appendChild(fadeLabel);
    side.appendChild(fadeInput);
    side.appendChild(imageLabel);
    side.appendChild(imageBox);
    side.appendChild(uploadLabel);
    if (frame.image) {
      var removeImageButton = document.createElement('button');
      removeImageButton.className = 'small';
      removeImageButton.textContent = 'remove image';
      removeImageButton.onclick = (function(index) {
        return function() {
          frames[index].image = null;
          frames[index].imageObj = null;
          renderFrameList();
          showFrameLive(index);
        };
      })(i);
      side.appendChild(removeImageButton);
    }
    side.appendChild(removeButton);
    row.appendChild(framehead);
    framecontent.appendChild(textarea);
    framecontent.appendChild(side);
    row.appendChild(framecontent);
    frameList.appendChild(row);
  }
}
function loadImageFile(file, index) {
  var reader = new FileReader();
  reader.onload = function(event) {
    var img = new Image();
    img.onload = function() {
      frames[index].image = event.target.result;
      frames[index].imageObj = img;
      renderFrameList();
      showFrameLive(index);
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
}
function addFrame() {
  frames.push({ text: "new text", duration: 5, size: 40, fade: 1.25, image: null, imageObj: null });
  renderFrameList();
}
function setAspect(ratio) {
  aspectRatio = ratio;
  canvas.height = ratio === '16:9' ? 360 : 480;
  canvas.style.height = canvas.height + 'px';
  document.getElementById('aspect169').className = ratio === '16:9' ? 'active' : '';
  document.getElementById('aspect43').className = ratio === '4:3' ? 'active' : '';
  drawAtTime(ctx, canvas.width, canvas.height, 0);
}
function getExportDimensions(quality, ratio) {
  if (ratio === '16:9') {
    if (quality === '480p') return { width: 854, height: 480, bitrate: 2500000 };
    if (quality === '1080p') return { width: 1920, height: 1080, bitrate: 8000000 };
    return { width: 1280, height: 720, bitrate: 5000000 };
  }
  if (quality === '480p') return { width: 640, height: 480, bitrate: 2000000 };
  if (quality === '1080p') return { width: 1440, height: 1080, bitrate: 7000000 };
  return { width: 960, height: 720, bitrate: 4000000 };
}
function drawImageCover(targetCtx, img, width, height) {
  var imgRatio = img.width / img.height;
  var canvasRatio = width / height;
  var drawWidth, drawHeight, offsetX, offsetY;
  if (imgRatio > canvasRatio) {
    drawHeight = height;
    drawWidth = height * imgRatio;
    offsetX = (width - drawWidth) / 2;
    offsetY = 0;
  } else {
    drawWidth = width;
    drawHeight = width / imgRatio;
    offsetX = 0;
    offsetY = (height - drawHeight) / 2;
  }
  targetCtx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
}
function drawFrame(targetCtx, width, height, frame, alpha) {
  targetCtx.globalAlpha = alpha;
  if (frame.imageObj) {
    drawImageCover(targetCtx, frame.imageObj, width, height);
  } else {
    targetCtx.fillStyle = '#0c437b';
    targetCtx.fillRect(0, 0, width, height);
  }
  if (frame.text) {
    var scale = width / 640;
    targetCtx.fillStyle = '#ffffff';
    targetCtx.shadowColor = 'rgba(0,0,0,0.8)';
    targetCtx.shadowBlur = 6 * scale;
    targetCtx.font = (frame.size * scale) + 'px Arial';
    targetCtx.textAlign = 'center';
    targetCtx.textBaseline = 'middle';
    var lines = frame.text.split('\n');
    var lineHeight = frame.size * scale * 1.3;
    var startY = height / 2 - ((lines.length - 1) * lineHeight) / 2;
    for (var i = 0; i < lines.length; i++) {
      targetCtx.fillText(lines[i], width / 2, startY + i * lineHeight);
    }
    targetCtx.shadowBlur = 0;
  }
  targetCtx.globalAlpha = 1;
}
function drawAtTime(targetCtx, width, height, time) {
  var elapsed = 0;
  for (var i = 0; i < frames.length; i++) {
    var frame = frames[i];
    var frameStart = elapsed;
    var frameEnd = elapsed + frame.duration;
    if (time >= frameStart && time < frameEnd) {
      if (i > 0) {
        var fadeDur = Math.max(0.001, frames[i - 1].fade || 0);
        var intoFrame = time - frameStart;
        if (intoFrame < fadeDur) {
          var fadeIn = Math.min(1, intoFrame / fadeDur);
          drawFrame(targetCtx, width, height, frames[i - 1], 1);
          drawFrame(targetCtx, width, height, frame, fadeIn);
          return;
        }
      }
      drawFrame(targetCtx, width, height, frame, 1);
      return;
    }
    elapsed = frameEnd;
  }
  drawFrame(targetCtx, width, height, frames[frames.length - 1], 1);
}
function totalDuration() {
  var total = 0;
  for (var i = 0; i < frames.length; i++) total += frames[i].duration;
  return total;
}
var previewPlaying = false;
var previewAudio = null;
var previewFrameId = null;
function stopPreview() {
  if (previewFrameId !== null) {
    cancelAnimationFrame(previewFrameId);
    previewFrameId = null;
  }
  if (previewAudio) {
    previewAudio.pause();
    previewAudio.currentTime = 0;
    previewAudio = null;
  }
  previewPlaying = false;
}
function showFrameLive(index) {
  stopPreview();
  drawFrame(ctx, canvas.width, canvas.height, frames[index], 1);
}
function playPreview() {
  stopPreview();
  previewPlaying = true;
  var duration = totalDuration();
  if (activeAudioBlob) {
    previewAudio = new Audio(URL.createObjectURL(activeAudioBlob));
    previewAudio.currentTime = 0;
    previewAudio.play().catch(function() {});
  } else {
    previewAudio = null;
  }
  var startTime = performance.now();
  function step(now) {
    var elapsed = previewAudio ? previewAudio.currentTime : (now - startTime) / 1000;
    if (elapsed >= duration) {
      drawAtTime(ctx, canvas.width, canvas.height, duration - 0.001);
      if (previewAudio) {
        previewAudio.pause();
        previewAudio.currentTime = 0;
      }
      previewFrameId = null;
      previewPlaying = false;
      return;
    }
    drawAtTime(ctx, canvas.width, canvas.height, elapsed);
    previewFrameId = requestAnimationFrame(step);
  }
  previewFrameId = requestAnimationFrame(step);
}
function exportVideo() {
  var status = document.getElementById('status');
  status.textContent = '';
  if (typeof MediaRecorder === 'undefined') {
    status.textContent = 'Export failed: this browser does not support video processing.';
    return;
  }
  var mimeType = 'video/webm;codecs=vp9,opus';
  if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm;codecs=vp8,opus';
  if (!MediaRecorder.isTypeSupported(mimeType)) mimeType = 'video/webm';
  if (!MediaRecorder.isTypeSupported(mimeType)) {
    status.textContent = 'Export failed: no supported video format in this browser.';
    return;
  }
  var quality = document.getElementById('qualitySelect').value;
  var dims = getExportDimensions(quality, aspectRatio);
  var exportCanvas = document.createElement('canvas');
  exportCanvas.width = dims.width;
  exportCanvas.height = dims.height;
  var exportCtx = exportCanvas.getContext('2d');
  var stream;
  try {
    stream = exportCanvas.captureStream(120);
  } catch (error) {
    status.textContent = 'Export failed: ' + error.message;
    return;
  }
  var recorder;
  try {
    recorder = new MediaRecorder(stream, { mimeType: mimeType });
  } catch (error) {
    status.textContent = 'Export failed: ' + error.message;
    return;
  }
  var chunks = [];
  recorder.ondataavailable = function(event) {
    if (event.data.size > 0) chunks.push(event.data);
  };
  recorder.onstop = function() {
    var blob = new Blob(chunks, { type: mimeType });
    var link = document.createElement('a');
    link.download = 'blue_screen_video.webm';
    link.href = URL.createObjectURL(blob);
    link.click();
    status.textContent = 'Export complete. Video downloaded.';
    setTimeout(() => URL.revokeObjectURL(link.href), 1000);
  };
  var duration = totalDuration();
  if (duration <= 0) {
    status.textContent = 'Nothing to export.';
    return;
  }
  status.textContent = 'Exporting...';
  recorder.start();
  var startTime = performance.now();
  function renderExportFrame(now) {
    var elapsed = (now - startTime) / 1000;
    if (elapsed >= duration) {
      drawAtTime(exportCtx, exportCanvas.width, exportCanvas.height, duration - 0.001);
      recorder.stop();
      return;
    }
    drawAtTime(exportCtx, exportCanvas.width, exportCanvas.height, elapsed);
    requestAnimationFrame(renderExportFrame);
  }
  requestAnimationFrame(renderExportFrame);
  if (activeAudioBlob) {
    var audioElement = new Audio(URL.createObjectURL(activeAudioBlob));
    audioElement.play().catch(function() {});
    setTimeout(() => { if (audioElement) audioElement.pause(); }, duration * 1000 + 500);
  }
}
renderFrameList();
drawAtTime(ctx, canvas.width, canvas.height, 0);
</script>
</body>
</html>
